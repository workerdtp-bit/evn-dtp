name: EVN Scraper Weekly

on:
  schedule:
    # 11:10 UTC tương ứng với 18:10 giờ Việt Nam (GMT+7)
    # Chạy T7 để đảm bảo cập nhật dữ liệu liên tục
    - cron: '00 00 * * 1,5'
  workflow_dispatch: # Cho phép bấm nút "Run workflow" để chạy tay

jobs:
  build:
    runs-on: ubuntu-latest
    # Đặt giới hạn 4 tiếng (240 phút) để an toàn
    timeout-minutes: 240 
    
    env:
      # Ép các Action chạy trên Node.js 24 để hết cảnh báo vàng
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout code
        # Cập nhật lên v4.2.2 để hỗ trợ Node 24
        uses: actions/checkout@v5

      - name: Setup Python
        # Cập nhật lên v5.4.0 để tương thích hoàn toàn
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          # Cache pip giúp các lần chạy sau nhanh hơn
          cache: 'pip' 

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium pandas webdriver-manager openpyxl gspread google-auth

      - name: Run scraper
        env:
          GCP_JSON: ${{ secrets.GCP_JSON }}
        # Thêm biến PYTHONUNBUFFERED để log hiện ra ngay lập tức
        run: |
          export PYTHONUNBUFFERED=1
          python main.py

      - name: Upload results
        # Luôn chạy bước này kể cả khi script cào dữ liệu gặp lỗi
        if: always() 
        # Cập nhật lên v4.6.0 để xóa cảnh báo deprecation
        uses: actions/upload-artifact@v5
        with:
          name: evn-result
          path: |
            datasauget.csv
            output.xlsx
