name: EVN Scraper Auto

on:
  schedule:
    - cron: '0 11 * * *'  # 18:00 Việt Nam (UTC+7)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ======================
      # 🔥 CHẠY 4 NGÀY 1 LẦN
      # ======================
      - name: Check 4-day cycle
        run: |
          DAY=$(date +%s)
          if [ $(( (DAY / 86400) % 4 )) -ne 0 ]; then
            echo "⛔ Skip run (not in 4-day cycle)"
            exit 78
          fi

      # ======================
      # SETUP PYTHON
      # ======================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ======================
      # INSTALL DEPENDENCIES
      # ======================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ======================
      # RUN SCRAPER
      # ======================
      - name: Run scraper
        env:
          GCP_JSON: ${{ secrets.GCP_JSON }}
        run: python -u main.py

      # ======================
      # SAVE RESULT
      # ======================
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evn-result
          path: |
            raw.csv
            output.xlsx
