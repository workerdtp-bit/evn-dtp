name: EVN Scraper Daily

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # Chạy mỗi ngày lúc 7h sáng VN

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Scraper
        run: python main.py

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: ket-qua-tra-cuu
          path: datasauget.xlsx
