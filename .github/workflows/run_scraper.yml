name: EVN Scraper & Google Sheets Upload

on:
  workflow_dispatch:
  schedule:
    - cron: '0 23 * * *'  # 6h sáng VN

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          GCP_JSON: ${{ secrets.GCP_JSON }}
        run: python main.py

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ket-qua
          path: |
            raw.csv
            output.xlsx
